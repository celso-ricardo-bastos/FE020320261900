<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="/css/override-bootstrap.css">
    <style>
    
        .titulo {
            background-image: var(--bs-gradient);
            /* background-color: aqua;
            background: linear-gradient(rgb(0, 0, 118), rgb(113, 130, 255)); */
        }
    </style>
</head>
<body>
    <section>
        <section>
            <h1 class="titulo bg-primary bg-gradient">Grid</h1>

            <div class="row">
                <div class="col-12 col-md-6 border">coluna 1</div>
                <div class="col-12 col-md-6 border">coluna 2</div>
                <div class="col-12 col-md-6 border">coluna 3</div>
                <div class="col-12 col-md-6 border">coluna 4</div>
            </div>
        </section>    


        <div class="container-md">
            <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exampleModal">
                Modal
            </button>
            <h1 class="text-center text-sm-start text-md-end">Contacts</h1>
            <p id="desc">Lorem ipsum dolor sit amet consectetur, adipisicing eli.</p>
            <form>
                <div class="form-group p-2">
                    <label for="caixa-nome">Nome:</label>
                    <input class="form-control" type="text" id="caixa-nome" name="nome" placeholder="Digite seu nome" pattern="[A-Za-z]{10}">
                </div>
                <div class="form-group p-2">
                    <label for="caixa-email">Email:</label>
                    <input class="form-control" type="email" id="caixa-email" name="email" placeholder="Digite seu Email" required>
                </div>
    
                <div class="form-group p-2">
                    <label for="caixa-data">Data da Ocorrencia:</label>
                    <input class="form-control" type="date" id="caixa-data" name="data" required>
                </div>
    
                <div class="form-group p-2">
                    <div>
                        <label for="comentario">Comentario</label>
                    </div>
                    <div>
                        <textarea class="form-control" name="comentario" id="comentario" rows="5" cols="30" required></textarea>
                    </div>
                </div>
                <input type="submit" value="Enviar" class="btn btn-primary">
            </form>

            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d4338.529121709758!2d-46.6427157!3d-23.550169099999998!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce584d233d2ff9%3A0x117d2705ed1c17a3!2sAv.%20Nove%20de%20Julho%2C%20455%20-%20Bela%20Vista%2C%20S%C3%A3o%20Paulo%20-%20SP%2C%2001313-000!5e1!3m2!1sen!2sbr!4v1772586998615!5m2!1sen!2sbr" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>
        <!-- Button trigger modal -->


<!-- Modal -->
<div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h1 class="modal-title fs-5" id="exampleModalLabel">Login</h1>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        
            <form>
                Nome: <input class="form-control" type="text">
                Senha <input class="form-control" type="password">
            </form>


      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary">Logar</button>
      </div>
    </div>
  </div>
</div>

        <!-- <iframe src="../index.html" frameborder="1"></iframe> -->
    
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
